<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gentle-AI Tutorial Interactivo</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/+esm"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0b0e;
      color: #ececf1;
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      gap: 1px;
      background: #1a1a1f;
    }

    /* Sidebar */
    .sidebar {
      background: #16161a;
      border-right: 1px solid #2a2a2f;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 0 16px 20px;
      border-bottom: 1px solid #2a2a2f;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #78da47 0%, #60b96a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 4px;
      background: #2a2a2f;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #78da47 0%, #60b96a 100%);
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      color: #74747f;
      margin-top: 6px;
    }

    .search-box {
      margin: 16px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a1f;
      border: 1px solid #2a2a2f;
      border-radius: 6px;
      color: #ececf1;
      font-size: 13px;
      transition: all 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: #78da47;
      background: #1f1f25;
    }

    .search-box input::placeholder {
      color: #74747f;
    }

    .lessons-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }

    .section-group {
      margin-bottom: 20px;
    }

    .section-title {
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #74747f;
      letter-spacing: 0.5px;
    }

    .lesson-item {
      padding: 10px 16px;
      margin: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #ececf1;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .lesson-item:hover {
      background: #2a2a2f;
      color: #78da47;
    }

    .lesson-item.active {
      background: #2a2a2f;
      border-left-color: #78da47;
      color: #78da47;
      font-weight: 500;
    }

    .lesson-item.completed::before {
      content: "✓ ";
      color: #78da47;
      font-weight: bold;
    }

    /* Main content */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a2f;
      background: #0f0f12;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .lesson-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: #74747f;
    }

    .lesson-counter {
      font-weight: 600;
      color: #78da47;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .markdown {
      color: #ececf1;
    }

    .markdown h1 {
      font-size: 32px;
      margin: 0 0 24px 0;
      font-weight: 700;
      background: linear-gradient(135deg, #78da47 0%, #60b96a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .markdown h2 {
      font-size: 20px;
      margin: 32px 0 16px 0;
      font-weight: 600;
      color: #ececf1;
      border-bottom: 1px solid #2a2a2f;
      padding-bottom: 12px;
    }

    .markdown h3 {
      font-size: 16px;
      margin: 24px 0 12px 0;
      font-weight: 600;
      color: #ececf1;
    }

    .markdown h4,
    .markdown h5,
    .markdown h6 {
      font-size: 14px;
      margin: 16px 0 8px 0;
      font-weight: 600;
      color: #ececf1;
    }

    .markdown p {
      margin: 12px 0;
      line-height: 1.8;
    }

    .markdown ul,
    .markdown ol {
      margin: 16px 0;
      padding-left: 24px;
    }

    .markdown li {
      margin: 6px 0;
      line-height: 1.7;
    }

    .markdown code {
      background: #1a1a1f;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
      font-size: 13px;
      color: #78da47;
    }

    .markdown pre {
      background: #1a1a1f;
      border: 1px solid #2a2a2f;
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      overflow-x: auto;
    }

    .markdown pre code {
      background: none;
      padding: 0;
      color: #ececf1;
    }

    .markdown blockquote {
      border-left: 4px solid #78da47;
      padding: 12px 16px;
      background: #1a1a1f;
      margin: 16px 0;
      border-radius: 4px;
      color: #b8b8c0;
    }

    .markdown table {
      border-collapse: collapse;
      margin: 16px 0;
      width: 100%;
    }

    .markdown th,
    .markdown td {
      border: 1px solid #2a2a2f;
      padding: 8px 12px;
      text-align: left;
    }

    .markdown th {
      background: #1a1a1f;
      font-weight: 600;
    }

    .markdown a {
      color: #78da47;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .markdown a:hover {
      border-bottom-color: #78da47;
    }

    .markdown hr {
      border: none;
      height: 1px;
      background: #2a2a2f;
      margin: 24px 0;
    }

    /* Navigation */
    .footer {
      padding: 20px 24px;
      border-top: 1px solid #2a2a2f;
      background: #0f0f12;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .nav-button {
      padding: 10px 16px;
      background: #1a1a1f;
      border: 1px solid #2a2a2f;
      color: #ececf1;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-button:hover:not(:disabled) {
      background: #78da47;
      color: #0b0b0e;
      border-color: #78da47;
    }

    .nav-button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #2a2a2f;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3a3a3f;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 280px;
        height: 100%;
        z-index: 100;
      }

      .sidebar.open {
        display: flex;
      }

      .content {
        padding: 24px;
      }

      .markdown h1 {
        font-size: 24px;
      }

      .markdown h2 {
        font-size: 18px;
      }
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 14px;
      color: #74747f;
    }

    .error {
      color: #ff8a80;
      padding: 20px;
      background: #2a1215;
      border-radius: 8px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">Gentle·AI</div>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <div class="progress-text"><span class="progress-number">0</span>% completado</div>
      </div>

      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Buscar lecciones..."
          autocomplete="off"
        />
      </div>

      <div class="lessons-list" id="lessonsList"></div>
    </div>

    <!-- Main Content -->
    <div class="main">
      <div class="header">
        <div class="header-content">
          <div class="lesson-meta">
            <span class="lesson-number">Lección <span class="lesson-counter">1</span></span>
            <span class="lesson-section"></span>
          </div>
        </div>
      </div>

      <div class="content" id="content">
        <div class="loading">Cargando lecciones...</div>
      </div>

      <div class="footer">
        <button class="nav-button" id="prevBtn" disabled>
          ← Anterior
        </button>
        <button class="nav-button" id="nextBtn">
          Siguiente →
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { marked } from "https://cdn.jsdelivr.net/npm/marked@11.1.1/+esm";

    let lessons = [];
    let currentLessonId = 1;
    let completedLessons = new Set(JSON.parse(localStorage.getItem("completedLessons") || "[]"));

    // Load lessons metadata
    async function loadLessons() {
      try {
        const response = await fetch("lessons.json");
        const data = await response.json();
        lessons = data.lessons;
        renderSidebar();
        loadLesson(1);
      } catch (error) {
        document.getElementById("content").innerHTML =
          '<div class="error">Error loading lessons: ' + error.message + "</div>";
      }
    }

    // Render sidebar with lessons
    function renderSidebar() {
      const list = document.getElementById("lessonsList");
      const sections = {};

      lessons.forEach((lesson) => {
        if (!sections[lesson.section]) {
          sections[lesson.section] = [];
        }
        sections[lesson.section].push(lesson);
      });

      let html = "";
      Object.entries(sections).forEach(([section, sectionLessons]) => {
        html += `<div class="section-group">
          <div class="section-title">${section}</div>`;

        sectionLessons.forEach((lesson) => {
          const isCompleted = completedLessons.has(lesson.id);
          const isActive = lesson.id === currentLessonId;
          html += `<div class="lesson-item ${isActive ? "active" : ""} ${
            isCompleted ? "completed" : ""
          }" data-id="${lesson.id}">
            ${lesson.title}
          </div>`;
        });

        html += `</div>`;
      });

      list.innerHTML = html;

      // Add click handlers
      document.querySelectorAll(".lesson-item").forEach((item) => {
        item.addEventListener("click", () => {
          const id = parseInt(item.dataset.id);
          loadLesson(id);
        });
      });
    }

    // Load and display lesson
    async function loadLesson(id) {
      const lesson = lessons.find((l) => l.id === id);
      if (!lesson) return;

      currentLessonId = id;

      try {
        const response = await fetch(lesson.file);
        let content = await response.text();

        // Remove front matter and internal links
        content = content
          .replace(/^---[\s\S]*?---\n/, "")
          .replace(/← \[Volver[^\]]*\]\([^\)]*\)\n\n/g, "")
          .replace(/➡️ \*\*\[[^\]]*\]\([^\)]*\)\*\*[^\n]*\n/g, "")
          .replace(/---\n/g, "---\n")
          .replace(/\[([^\]]+)\]\(([^)]+\.md)\)/g, (match, text, file) => {
            const linkedLesson = lessons.find((l) => l.file === file);
            if (linkedLesson) {
              return `[${text}](#lesson-${linkedLesson.id})`;
            }
            return match;
          });

        const html = marked.parse(content);
        document.getElementById("content").innerHTML = `<div class="markdown">${html}</div>`;

        // Update UI
        updateUI(lesson);
        renderSidebar();
        completedLessons.add(id);
        saveLessons();
        updateProgress();

        // Add link handlers
        document.querySelectorAll('a[href^="#lesson-"]').forEach((link) => {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            const lessonId = parseInt(link.href.split("-")[1]);
            loadLesson(lessonId);
          });
        });

        window.scrollTo(0, 0);
      } catch (error) {
        document.getElementById("content").innerHTML =
          '<div class="error">Error loading lesson: ' + error.message + "</div>";
      }
    }

    // Update header and navigation
    function updateUI(lesson) {
      document.querySelector(".lesson-counter").textContent = lesson.id;
      document.querySelector(".lesson-section").textContent = lesson.section;

      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");

      prevBtn.disabled = lesson.id === 1;
      nextBtn.disabled = lesson.id === lessons.length;

      prevBtn.onclick = () => loadLesson(lesson.id - 1);
      nextBtn.onclick = () => loadLesson(lesson.id + 1);
    }

    // Update progress bar
    function updateProgress() {
      const progress = (completedLessons.size / lessons.length) * 100;
      document.querySelector(".progress-fill").style.width = progress + "%";
      document.querySelector(".progress-number").textContent = Math.round(progress);
    }

    // Save progress
    function saveLessons() {
      localStorage.setItem("completedLessons", JSON.stringify(Array.from(completedLessons)));
    }

    // Search functionality
    document.getElementById("searchInput").addEventListener("input", (e) => {
      const query = e.target.value.toLowerCase();
      document.querySelectorAll(".lesson-item").forEach((item) => {
        const text = item.textContent.toLowerCase();
        item.parentElement.style.display = text.includes(query) ? "" : "none";
      });

      // Also hide empty section groups
      document.querySelectorAll(".section-group").forEach((group) => {
        const hasVisible = group.querySelector(".lesson-item[style='']") !== null ||
                          group.querySelector(".lesson-item:not([style])") !== null;
        group.style.display = hasVisible || query === "" ? "" : "none";
      });
    });

    // Initialize
    loadLessons();
  </script>
</body>
</html>
